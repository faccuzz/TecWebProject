<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="utf-8">
        <title>Lumen Spirits — Accedi</title>
        <meta name="description" content="Accedi al tuo account Lumen Spirits">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="style/desktop.css">
        <link rel="stylesheet" href="style/mobile.css">
        <link rel="stylesheet" media="print" href="style/print.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

        <script src="assets/js/account/form-checker.js" defer="defer"></script>
    </head>
    <body class="login-page">
        <a href="#main-content" class="sr-only sr-only--focusable">Salta al contenuto principale</a>
        <header class="area-logo">
            <h1 class="company-name" lang="en">Lumen Spirits</h1>
        </header>

        <main id="main-content" class="login-card">
            <h2>Accedi</h2>
            <form action="php/account/login.php" method="post" id="access-form" novalidate="novalidate">
                <div class="form-group">

                    <label for="email-input">Email o Username</label>
                    <input type="text" id="email-input" name="identifier" autocomplete="username" aria-describedby="login-email-error" required="required">
                    <p class="form-error-msg" id="login-email-error" role="alert" aria-live="polite"></p>

                </div>
                <div class="form-group">

                    <label for="password-input">Password</label>
                    <input type="password" id="password-input" name="password" autocomplete="current-password" aria-describedby="login-password-error" required="required">
                    <p class="form-error-msg" id="login-password-error" role="alert" aria-live="polite"></p>

                </div>
                <button type="button" class="forgotten" id="forgot-password-btn" aria-describedby="forgot-password-error">Hai dimenticato la password?</button>
                <p class="form-error-msg" id="forgot-password-error" role="status" aria-live="polite"></p>
                <button type="submit" name="login">Accedi</button>
            </form>
            <a class="register" href="register.html">Registrati</a>
        </main>
    </body>
</html>
