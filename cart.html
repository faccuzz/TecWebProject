<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <title>Lumen Spirits — Carrello</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style/desktop.css" />
    <link rel="stylesheet" href="style/mobile.css" />
    <link rel="stylesheet" media="print" href="style/print.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./assets/js/bridge.js" defer="defer"></script>
    <script src="./assets/js/cart/cart-manager.js" defer="defer"></script>

<body class="cart-body">
    <a href="#main-content" class="sr-only sr-only--focusable">Salta al contenuto principale</a>
