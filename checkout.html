<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Lumen Spirits — Checkout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style/desktop.css">
    <link rel="stylesheet" href="style/mobile.css">
    <link rel="stylesheet" media="print" href="style/print.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="assets/js/bridge.js" defer></script>
    <script src="assets/js/cart/checkout-manager.js" defer></script>
</head>

<body>
    <a href="#main-content" class="sr-only sr-only--focusable">Salta al contenuto principale</a>
    <header>
        <nav aria-label="Navigazione carrello">
            <div class="nav-links">
                <a href="cart.html" aria-label="Torna al carrello"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i></a>
            </div>

            <div class="logo" lang="en">LUMEN SPIRITS</div>

            <div class="nav-icons"></div>
        </nav>
    </header>
    <main class="checkout-layout" id="main-content">
        <section class="form" aria-labelledby="billing-title">
            <h2 id="billing-title">Dati di fatturazione</h2>
            <form action="checkout.html" method="post" id="Checkout-form" novalidate>
                <div class="form-group">

                    <label for="email-input">Email</label>
                    <input type="email" id="email-input" name="email" autocomplete="email" aria-describedby="checkout-email-error" required>
                    <p class="form-error-msg" id="checkout-email-error" role="alert" aria-live="polite"></p>

                </div>
                <div class="form-group">

                    <label for="name-input">Nome</label>
                    <input type="text" id="name-input" name="name" autocomplete="given-name" aria-describedby="checkout-name-error" required>
                    <p class="form-error-msg" id="checkout-name-error" role="alert" aria-live="polite"></p>

                </div>
                <div class="form-group">

                    <label for="surname-input">Cognome</label>
                    <input type="text" id="surname-input" name="surname" autocomplete="family-name" aria-describedby="checkout-surname-error" required>
                    <p class="form-error-msg" id="checkout-surname-error" role="alert" aria-live="polite"></p>

                </div>
                <div class="form-group">
                    <label for="address">Indirizzo</label>
                    <input type="text" id="address" name="address" autocomplete="address-line1" placeholder="Via, numero civico…" aria-describedby="checkout-address-error" required>
                    <p class="form-error-msg" id="checkout-address-error" role="alert" aria-live="polite"></p>

                </div>
                <button type="submit" class="button" name="checkout">Paga ora</button>
            </form>
        </section>
        <section class="order-summary" aria-labelledby="order-summary-title">
            <h2 id="order-summary-title">Il tuo ordine</h2>
            <h3>Prodotti</h3>
            <div id="previewProducts"></div>
            <hr>
            <div class="summary-line">
                <span>Subtotale</span>
                <span id="subtotal-amount">€ 0,00</span>
            </div>
            <div class="summary-line">
                <span>Spedizione</span>
                <span>Gratuita</span>
            </div>
            <div id="checkout-total" class="summary-line" aria-live="polite">
            </div>
        </section>
    </main>
</body>

</html>
