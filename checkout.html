<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link rel="stylesheet" type="text/css" href="style/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src=""></script>
    <script src="" defer></script>
</head>

<body>
    <header class="checkout-header">
        <div class="top-row">
            <a href="cart.html" class="back-to-cart">
                <i class="fas fa-arrow-left"></i>Back to Cart
            </a>

            <div class="checkout-logo">
                <a href="index.html">LUMEN SPIRITS</a>
            </div>
        </div>
        <div class="bottom-row">
            <h1>Checkout</h1>
        </div>
            
    </header>
    <div class="checkout-layout">
        <div class="form">
            <form action="" method="post" id="Checkout-form" novalidate>
                <div class="form-group">

                    <label for="email">Email</label>
                    <input type="email" id="email-input" name="email" autocomplete="email" required>
                    <p class="form-error-msg">Error placeholder</p>

                </div>
                <div class="form-group">

                    <label for="name">Name</label>
                    <input type="text" id="name-input" name="name" autocomplete="given-name" required>
                    <p class="form-error-msg">Error placeholder</p>

                </div>
                <div class="form-group">

                    <label for="surname">Surname</label>
                    <input type="text" id="surname-input" name="surname" autocomplete="family-name" required>
                    <p class="form-error-msg">Error placeholder</p>

                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="Street,number,..." required>
                    <p class="form-error-msg">Error placeholder</p>

                </div>
                <button type="submit" name="checkout">Pay now</button>
            </form>
        </div>
        <div class="order-summary">
        <h1>Your order</h1>
        <h2>Products</h2>
        <div id="itemsInCart"></div>
        <hr>
        <div class="summary-line">
                <span>Subtotal</span>
                <span>120,00 €</span>
            </div>
            <div class="summary-line">
                <span>Shipping Cost</span>
                <span>Free</span>
            </div>
            <div class="summary-line total">
                <span>Total</span>
                <span class="total-price">120,00 €</span>
            </div>
        </div>
    </div>
    
    <!-- end body -->
</body>
</html>
