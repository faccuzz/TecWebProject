<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title> Register - Creative Rebirth</title>
    <meta name="description" content="Register">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style/desktop.css">
    <link rel="stylesheet" href="style/mobile.css">
    <link rel="stylesheet" media="print" href="style/print.css">

    <!--Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    
    <!--IntlTelInput Libray-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js" defer></script>

    <script src="assets/js/account/form-checker.js" defer></script>
</head>

<body class="login-page">
    <a href="#main-content" class="sr-only sr-only--focusable">Skip to main content</a>
    <header class="area-logo">
        <h1 class="company-name">Creative Rebirth</h1>
        <!--Meter logo en vez otra opción-->
    </header>

    <main id="main-content" class="login-card">
        <h2>Register</h2>
        <form action="php/account/register.php" method="post" id="access-form" novalidate>
            <div class="form-group">

                <label for="email-input">Email</label>
                <input type="email" id="email-input" name="email" autocomplete="email" aria-describedby="register-email-error" required>
                <p class="form-error-msg" id="register-email-error" role="alert">Error placeholder</p>

            </div>
            <div class="form-group">

                <label for="password-input">Password</label>
                <input type="password" id="password-input" name="password" autocomplete="current-password" aria-describedby="password-requirements-group" required>

                <p>Password must contain:</p>

                <div class="password-requirements" id="password-requirements-group">
                    <p id="requirement-1">
                        At least 8 Character
                    </p>
                    <p id="requirement-2">
                        At least a Number
                    </p>
                    <p id="requirement-3">
                        At least an Uppercase Letter
                    </p>
                    <p id="requirement-4">
                        At least a Special Character
                    </p>
                </div>

            </div>
            <div class="form-group">

                <label for="name-input">Name</label>
                <input type="text" id="name-input" name="name" autocomplete="given-name" aria-describedby="register-name-error" required>
                <p class="form-error-msg" id="register-name-error" role="alert">Error placeholder</p>

            </div>
            <div class="form-group">

                <label for="surname-input">Surname</label>
                <input type="text" id="surname-input" name="surname" autocomplete="family-name" aria-describedby="register-surname-error" required>
                <p class="form-error-msg" id="register-surname-error" role="alert">Error placeholder</p>
            </div>
            <div class="form-group">
                <label for="phone-input">Phone Number</label>
                <input type="text" id="phone-input" name="phone" aria-describedby="register-phone-error" required>
                <p class="form-error-msg" id="register-phone-error" role="alert">Error placeholder</p>
            </div>
            <input type="hidden" name="isAdmin" value="0">
            <p class="form-error-msg" id="general-register-error" role="alert"></p>
            <button type="submit">Create account</button>
        </form>
        <a class="register" href="login.html">Login</a>
    </main>
</body>

</html>
